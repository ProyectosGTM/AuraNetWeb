<div class="container-fluid" [@fadeInRight]>
  <div class="row">
    <div class="col-12">
      <div class="title-banner-card shadow-sm">
        <div class="title-banner-content d-flex align-items-center justify-content-between flex-wrap p-1 pb-0">
          <div class="d-flex align-items-center gap-3">
            <div class="title-icon">
              <i class="fas fa-wallet"></i>
            </div>
            <div>
              <h4 class="title-title">Promociones por Monedero</h4>
              <p class="title-subtitle">Consulta todas las promociones ligadas a un monedero.</p>
            </div>
          </div>
          <div class="title-actions">
            <div class="title-tagline">
              <span class="line"></span>
              <span class="text">Filtro por ID de monedero</span>
            </div>
          </div>
        </div>

        <div class="panel-card mt-3">
          <div class="panel-head">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
              <div class="d-flex align-items-center gap-2">
                <i class="fas fa-filter text-info"></i>
                <span class="text-white fw-semibold">Filtro de monedero</span>
              </div>
            </div>
          </div>
          <div class="panel-body">
            <form [formGroup]="form" (ngSubmit)="buscar()">
              <div class="row g-3 align-items-end">
                <div class="col-12 col-md-4">
                  <label class="field">
                    <span class="field-label text-white">ID Monedero *</span>
                    <div class="input-sleek">
                      <i class="fas fa-barcode"></i>
                      <input
                        type="number"
                        min="1"
                        class="sleek-control"
                        formControlName="idMonedero"
                        placeholder="Ej: 1" />
                      <span class="sleek-line"></span>
                    </div>
                  </label>
                </div>
                <div class="col-12 col-md-4 d-flex gap-3 flex-wrap">
                  <button type="submit" class="btn-alt btn-alt--success" [disabled]="form.invalid || loading">
                    <i class="fas fa-search"></i>
                    <span>{{ loading ? 'Buscando...' : 'Buscar' }}</span>
                  </button>
                  <button type="button" class="btn-alt btn-alt--cancel" (click)="form.reset(); list = []">
                    <i class="fas fa-times"></i>
                    <span>Limpiar</span>
                  </button>
                </div>
              </div>
            </form>

            <div class="mt-3" *ngIf="loading">
              <i class="fas fa-spinner fa-spin"></i>
              <span>Cargando promociones...</span>
            </div>

            <div class="mt-3" *ngIf="!loading && form.valid && form.value.idMonedero && list.length === 0">
              <p class="text-muted mb-0">No se encontraron promociones para este monedero.</p>
            </div>
          </div>
        </div>

        <div class="panel-card mt-3" *ngIf="list.length > 0">
          <div class="panel-head">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
              <div class="d-flex align-items-center gap-2">
                <i class="fas fa-gift text-success"></i>
                <span class="text-white fw-semibold">Resultado de promociones</span>
              </div>
            </div>
          </div>
          <div class="panel-body">
            <dx-data-grid
              [dataSource]="list"
              keyExpr="id"
              [columnHidingEnabled]="true"
              [showBorders]="true"
              [showColumnLines]="true"
              [showRowLines]="true"
              [rowAlternationEnabled]="true">
              <dxo-search-panel [visible]="true" [width]="200" placeholder="Buscar..."></dxo-search-panel>
              <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[20]" [showInfo]="true"></dxo-pager>
              <dxo-paging [pageSize]="20"></dxo-paging>

              <dxi-column caption="Acciones" cellTemplate="acciones" alignment="center" [width]="120"></dxi-column>
              <dxi-column dataField="nombre" caption="Nombre" dataType="string"></dxi-column>
              <dxi-column dataField="codigo" caption="Código" dataType="string"></dxi-column>
              <dxi-column dataField="fechaInicio" caption="Inicio" dataType="date"></dxi-column>
              <dxi-column dataField="fechaFin" caption="Fin" dataType="date"></dxi-column>
              <dxi-column dataField="estatus" caption="Estatus" dataType="string"></dxi-column>

              <div *dxTemplate="let row of 'acciones'" class="d-flex justify-content-center">
                <button type="button" class="btnAcciones" (click)="verDetalle(row.data.id)" ngbTooltip="Ver detalle">
                  <i class="fa fa-eye"></i>
                </button>
              </div>
            </dx-data-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
