<div class="container-fluid" [@fadeInRight]>
  <div class="row">
    <div class="col-12">
      <div class="title-banner-card shadow-sm">
        <div class="title-banner-content d-flex align-items-center justify-content-between flex-wrap p-1 pb-0">
          <div class="d-flex align-items-center gap-3">
            <div class="title-icon"><i class="fas fa-hourglass-half"></i></div>
            <div>
              <h4 class="title-title">Pendientes de Conversión</h4>
              <p class="title-subtitle">Bonos pendientes de convertir a efectivo.</p>
            </div>
          </div>
          <div class="title-buttons">
            <button type="button" class="btn-title btn-title--ghost" (click)="cargar()" [disabled]="loading">
              <i class="fas fa-sync-alt"></i> Actualizar
            </button>
          </div>
        </div>
        <div class="row mt-4">
          <div class="col-12">
            <div *ngIf="loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>
            <div class="table-responsive" *ngIf="!loading && list.length > 0">
              <table class="table table-dark table-striped">
                <thead>
                  <tr>
                    <th>Acciones</th>
                    <th>ID</th>
                    <th>Nombre / Descripción</th>
                    <th>Fecha</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let p of list">
                    <td>
                      <button type="button" class="btn btn-sm btn-outline-primary" (click)="verDetalle(p.idPromocion || p.id)" *ngIf="p.idPromocion || p.id">
                        <i class="fas fa-eye"></i>
                      </button>
                    </td>
                    <td>{{ p.id || '—' }}</td>
                    <td>{{ p.nombre || p.descripcion || '—' }}</td>
                    <td>{{ formatearFecha(p.fecha) }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <p *ngIf="!loading && list.length === 0" class="text-muted">No hay registros pendientes de conversión.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
