<div class="container-fluid" [@fadeInRight]>
  <div class="row">
    <div class="col-12">
      <div class="title-banner-card shadow-sm">
        <div class="title-banner-content d-flex align-items-center gap-3 p-1 pb-0">
          <div class="title-icon"><i class="fas fa-user-tag"></i></div>
          <div>
            <h4 class="title-title">Promociones por Afiliado</h4>
            <p class="title-subtitle">Consulta las promociones asociadas a un afiliado por ID.</p>
          </div>
        </div>
        <div class="row mt-4">
          <div class="col-12 col-md-6 col-lg-4">
            <form [formGroup]="form" (ngSubmit)="buscar()">
              <label class="form-label text-white">ID Afiliado</label>
              <div class="d-flex gap-2">
                <input type="number" class="form-control bg-dark text-white border-secondary" formControlName="idAfiliado" placeholder="Ej: 1" min="1" />
                <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                  <i class="fas fa-search"></i> Buscar
                </button>
              </div>
            </form>
          </div>
        </div>
        <div class="row mt-4" *ngIf="list.length > 0">
          <div class="col-12">
            <div class="table-responsive">
              <table class="table table-dark table-striped">
                <thead>
                  <tr>
                    <th>Acciones</th>
                    <th>Nombre</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let p of list">
                    <td>
                      <button type="button" class="btn btn-sm btn-outline-primary" (click)="verDetalle(p.id)">
                        <i class="fas fa-eye"></i>
                      </button>
                    </td>
                    <td>{{ p.nombre || '—' }}</td>
                    <td>{{ formatearFecha(p.fechaInicio) }}</td>
                    <td>{{ formatearFecha(p.fechaFin) }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="row mt-3" *ngIf="!loading && form.value.idAfiliado && list.length === 0 && form.valid">
          <div class="col-12">
            <p class="text-muted">No se encontraron promociones para este afiliado.</p>
          </div>
        </div>
        <div *ngIf="loading" class="mt-3"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>
      </div>
    </div>
  </div>
</div>
