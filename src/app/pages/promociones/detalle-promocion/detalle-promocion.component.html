<div class="container-fluid" [@fadeInRight]>
  <div class="row">
    <div class="col-12">
      <div class="title-banner-card shadow-sm">
        <div class="title-banner-content d-flex align-items-center justify-content-between flex-wrap p-1 pb-0">
          <div class="d-flex align-items-center gap-3">
            <div class="title-icon"><i class="fas fa-gift"></i></div>
            <div>
              <h4 class="title-title">Detalle de Promoción</h4>
              <p class="title-subtitle" *ngIf="promocion">{{ promocion.nombre || 'Sin nombre' }}</p>
            </div>
          </div>
          <div class="title-buttons">
            <button type="button" class="btn-title btn-title--ghost" (click)="volver()">
              <i class="fas fa-arrow-left"></i> Volver al catálogo
            </button>
            <button type="button" class="btn-title btn-title--primary" (click)="irRollover()" *ngIf="promocion">
              <i class="fas fa-chart-line"></i> Ver rollover
            </button>
          </div>
        </div>
        <div class="row mt-4">
          <div class="col-12">
            <div *ngIf="loading" class="text-center py-5">
              <i class="fas fa-spinner fa-spin fa-2x"></i>
              <p class="mt-2">Cargando...</p>
            </div>
            <div *ngIf="error" class="alert alert-danger">
              {{ error }}
            </div>
            <div *ngIf="!loading && !error && promocion" class="card border-0 bg-dark text-white">
              <div class="card-body">
                <pre class="mb-0 small text-white" style="white-space: pre-wrap;">{{ promocion | json }}</pre>
                <p class="mt-3 mb-0 small text-muted">
                  Fecha inicio: {{ formatearFecha(promocion.fechaInicio) }} — Fin: {{ formatearFecha(promocion.fechaFin) }}
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
